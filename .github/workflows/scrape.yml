name: CI Job Scraper — Daily Pipeline

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC (all weekdays)
    - cron: '0 6 * * 6'  # Saturday 06:00 UTC (weekly digest)
  workflow_dispatch:      # Manual trigger

permissions:
  contents: write

jobs:
  scrape-and-enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      # ── Restore cached state files ───────────────────────────────────
      - name: Restore seen_jobs.db from cache
        uses: actions/cache@v4
        with:
          path: data/seen_jobs.db
          key: seen-jobs-db-${{ github.run_number }}
          restore-keys: |
            seen-jobs-db-

      - name: Restore jobs_enriched.csv from cache
        uses: actions/cache@v4
        with:
          path: data/jobs_enriched.csv
          key: jobs-enriched-csv-${{ github.run_number }}
          restore-keys: |
            jobs-enriched-csv-

      # ── Run pipeline ─────────────────────────────────────────────────
      - name: Run scraper
        run: python src/scraper.py

      - name: Run enrichment + signal generation
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python src/enrich.py

      - name: Run competitive signal scraper (launches + events)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python src/signal_scraper.py

      - name: Scrape company newsrooms (press releases)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python src/news_scraper.py

      - name: Generate intelligence verdicts (Phase 2.5 — verdict layer)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python src/verdict_engine.py

      - name: Build strategic roadmaps (published + inferred)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python src/roadmaps.py
        continue-on-error: true

      - name: Precompute Ask CI semantic layer
        run: python src/build_semantic_layer.py

      - name: Refresh v2 dataset (keep in sync with latest enriched data)
        run: python scripts/create_v2_dataset.py

      - name: Regenerate dashboard_v2.html with latest data (Phase 3b)
        run: python scripts/build_dashboard_v2.py

      - name: Regenerate dashboard_v3.html with latest data
        run: python scripts/build_dashboard_v3.py

      - name: Regenerate dashboard_v21.html with latest data
        run: python scripts/build_dashboard_v21.py

      - name: Route verdicts + signals to Slack (Phase 4)
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python src/slack_notifier.py
        continue-on-error: true

      - name: Generate weekly digest (Phase 5 — Saturdays only)
        if: github.event.schedule == '0 6 * * 6'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python src/weekly_digest.py
        continue-on-error: true

      # ── Print summary ────────────────────────────────────────────────
      - name: Pipeline summary
        run: |
          echo "## Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          RAW_COUNT=$(wc -l < data/jobs_raw.csv)
          ENRICHED_COUNT=$(wc -l < data/jobs_enriched.csv)
          V2_COUNT=$(wc -l < data/jobs_enriched_v2.csv)
          SIGNAL_COUNT=$(python -c "import json; print(len(json.load(open('data/signals.json'))))" 2>/dev/null || echo "0")
          COMP_SIGNAL_COUNT=$(python -c "import json; print(len(json.load(open('data/competitive_signals.json'))))" 2>/dev/null || echo "0")
          NEWS_COUNT=$(python -c "import json; print(len(json.load(open('data/news.json'))))" 2>/dev/null || echo "0")
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Raw jobs scraped | $((RAW_COUNT - 1)) |" >> $GITHUB_STEP_SUMMARY
          echo "| Enriched rows | $((ENRICHED_COUNT - 1)) |" >> $GITHUB_STEP_SUMMARY
          echo "| V2 dataset rows | $((V2_COUNT - 1)) |" >> $GITHUB_STEP_SUMMARY
          echo "| Hiring signals | $SIGNAL_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| Competitive signals | $COMP_SIGNAL_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| News items | $NEWS_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Run completed at $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY

      # ── Commit results back to repo ──────────────────────────────────
      - name: Commit updated data files
        run: |
          git config user.name "CI Bot"
          git config user.email "ci-bot@actian.com"
          git add -f data/jobs_enriched.csv data/jobs_enriched_v2.csv data/signals.json data/competitive_signals.json data/intelligence_verdicts.json data/news.json data/roadmaps.json data/semantic_layer.json data/seen_signals.json data/seen_news.json data/slack_sent.json dashboard/v1/dashboard.html dashboard/v2/dashboard_v2.html dashboard/v3/dashboard_v3.html dashboard/v2.1/dashboard_v21.html
          git diff --cached --quiet || git commit -m "chore: daily scrape $(date -u '+%Y-%m-%d')"
          git pull --rebase --autostash -X ours origin main
          git push

