  <style>
/* Actian CI Dashboard — editorial blue, Linear-style spacing */

/* ---------- Tokens ---------- */
:root {
  /* Warm-cool neutrals (low chroma) */
  --bg:        oklch(0.985 0.004 255);
  --bg-sunk:   oklch(0.965 0.005 255);
  --surface:   #ffffff;
  --border:    oklch(0.91 0.008 255);
  --border-strong: oklch(0.85 0.012 255);
  --ink:       oklch(0.22 0.02 255);
  --ink-soft:  oklch(0.42 0.02 255);
  --ink-mute:  oklch(0.58 0.015 255);

  /* Navy sidebar */
  --navy-900:  oklch(0.18 0.035 255);
  --navy-800:  oklch(0.22 0.04 255);
  --navy-700:  oklch(0.28 0.045 255);
  --navy-ink:  oklch(0.93 0.01 255);
  --navy-ink-soft: oklch(0.72 0.025 255);
  --navy-ink-mute: oklch(0.55 0.02 255);

  /* Blue accents */
  --blue-600:  oklch(0.52 0.17 248);
  --blue-500:  oklch(0.60 0.18 248);
  --blue-050:  oklch(0.97 0.03 248);
  --blue-100:  oklch(0.93 0.05 248);

  --radius-lg: 14px;
  --radius-md: 10px;
  --radius-sm: 6px;

  --shadow-card: 0 1px 2px oklch(0.22 0.02 255 / 0.04), 0 8px 24px oklch(0.22 0.02 255 / 0.04);
  --shadow-pop:  0 1px 2px oklch(0.22 0.02 255 / 0.06), 0 24px 56px oklch(0.22 0.02 255 / 0.18);

  --font-sans: "Inter", ui-sans-serif, system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
}

* { box-sizing: border-box; }
html, body, #root { height: 100%; }
body {
  margin: 0;
  font-family: var(--font-sans);
  color: var(--ink);
  background: var(--bg);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "ss01", "cv11";
}
button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
input { font: inherit; color: inherit; }
a { color: inherit; cursor: pointer; }

/* ---------- App shell ---------- */
.app {
  display: grid;
  grid-template-columns: 264px 1fr;
  min-height: 100vh;
}
.app:has(.sb-collapsed) { grid-template-columns: 72px 1fr; }
.main {
  min-width: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
}

/* ---------- Sidebar ---------- */
.sb {
  background: var(--navy-900);
  color: var(--navy-ink);
  padding: 20px 16px;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  border-right: 1px solid oklch(0.24 0.035 255);
  display: flex;
  flex-direction: column;
}
.sb-collapsed { padding: 20px 12px; align-items: center; }

.sb-brand {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 4px 6px 18px;
  border-bottom: 1px solid oklch(0.24 0.035 255);
  margin-bottom: 16px;
}
.sb-logo {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--blue-500), oklch(0.48 0.18 268));
  color: #fff;
  display: grid; place-items: center;
  flex: 0 0 32px;
}
.sb-brand-text { flex: 1; min-width: 0; }
.sb-brand-name { font-weight: 600; font-size: 14px; letter-spacing: -0.01em; color: #fff; }
.sb-brand-sub { font-size: 11px; color: var(--navy-ink-mute); letter-spacing: 0.02em; text-transform: uppercase; }
.sb-toggle {
  color: var(--navy-ink-mute);
  padding: 4px; border-radius: 6px;
}
.sb-toggle:hover { color: var(--navy-ink); background: oklch(1 0 0 / 0.06); }

.sb-sec-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--navy-ink-mute);
  padding: 14px 8px 8px;
}

.sb-nav { display: flex; flex-direction: column; gap: 2px; }
.sb-tab {
  position: relative;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 10px;
  border-radius: 8px;
  color: var(--navy-ink-soft);
  text-align: left;
  transition: background .15s, color .15s;
}
.sb-tab:hover { background: oklch(1 0 0 / 0.04); color: var(--navy-ink); }
.sb-tab-on {
  background: oklch(1 0 0 / 0.08);
  color: #fff;
}
.sb-tab-on .sb-tab-icon { color: var(--blue-500); }
.sb-tab-icon {
  width: 24px; height: 24px;
  display: grid; place-items: center;
  font-size: 14px;
  color: var(--navy-ink-mute);
  flex: 0 0 24px;
}
.sb-tab-text { display: flex; flex-direction: column; min-width: 0; }
.sb-tab-name { font-size: 13px; font-weight: 500; }
.sb-tab-desc { font-size: 11px; color: var(--navy-ink-mute); }
.sb-tab-on .sb-tab-desc { color: var(--navy-ink-soft); }
.sb-tab-rail {
  position: absolute; left: -16px; top: 10px; bottom: 10px;
  width: 2px; background: var(--blue-500); border-radius: 0 2px 2px 0;
}

.sb-watch {
  display: flex; flex-direction: column;
  padding: 0 4px;
}
.sb-watch-item {
  display: grid;
  grid-template-columns: 8px 1fr auto;
  align-items: center;
  gap: 10px;
  padding: 7px 4px;
  font-size: 13px;
  color: var(--navy-ink-soft);
  border-bottom: 1px solid oklch(0.22 0.035 255);
}
.sb-watch-item:last-child { border-bottom: 0; }
.sb-watch-dot { width: 8px; height: 8px; border-radius: 50%; }
.sb-watch-dot.t-critical { background: oklch(0.62 0.2 25); }
.sb-watch-dot.t-high     { background: oklch(0.7 0.15 65); }
.sb-watch-dot.t-medium   { background: oklch(0.62 0.15 245); }
.sb-watch-dot.t-low      { background: oklch(0.7 0.01 250); }
.sb-watch-name { color: var(--navy-ink); }
.sb-watch-score { font-family: var(--font-mono); font-size: 11px; color: var(--navy-ink-mute); }

.sb-foot {
  margin-top: auto;
  padding-top: 20px;
  border-top: 1px solid oklch(0.24 0.035 255);
}
.sb-foot-user { display: flex; align-items: center; gap: 10px; padding: 4px; }
.sb-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: oklch(0.55 0.12 255);
  display: grid; place-items: center;
  font-size: 11px; font-weight: 600; color: #fff;
  letter-spacing: 0.03em;
}
.sb-foot-name { font-size: 13px; color: #fff; }
.sb-foot-role { font-size: 11px; color: var(--navy-ink-mute); }

/* ---------- Top bar ---------- */
.tb {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 14px 32px;
  border-bottom: 1px solid var(--border);
  background: color-mix(in oklab, var(--bg), transparent 30%);
  backdrop-filter: blur(8px);
  position: sticky; top: 0; z-index: 10;
}
.tb-crumbs { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--ink-mute); }
.tb-crumb-sep { color: var(--border-strong); }
.tb-crumb-on { color: var(--ink); font-weight: 500; }
.tb-crumb-lens {
  margin-left: 6px;
  padding: 2px 8px;
  border-radius: 999px;
  background: var(--blue-050);
  color: var(--blue-600);
  font-weight: 500;
  font-size: 11px;
  letter-spacing: 0.02em;
}

.tb-tools { display: flex; align-items: center; gap: 8px; }
.tb-search {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  min-width: 340px;
  color: var(--ink-mute);
  transition: border-color .15s, box-shadow .15s;
}
.tb-search:focus-within {
  border-color: var(--blue-500);
  box-shadow: 0 0 0 3px color-mix(in oklab, var(--blue-500), transparent 85%);
}
.tb-search input { flex: 1; border: 0; outline: 0; background: transparent; color: var(--ink); font-size: 13px; }
.tb-search-kbd {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 1px 5px;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--ink-mute);
}

.tb-btn {
  padding: 7px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 13px; font-weight: 500;
  transition: background .15s, border-color .15s;
  position: relative;
}
.tb-btn:hover { background: var(--bg-sunk); }
.tb-btn-ghost { padding: 7px; }
.tb-btn-primary {
  background: var(--navy-900); color: #fff; border-color: var(--navy-900);
}
.tb-btn-primary:hover { background: var(--navy-800); }
.tb-btn-dot {
  position: absolute; top: 5px; right: 5px;
  width: 7px; height: 7px; border-radius: 50%;
  background: oklch(0.62 0.2 25);
  box-shadow: 0 0 0 2px var(--surface);
}

/* ---------- Hero + KPIs ---------- */
.hero { padding: 32px 32px 8px; }
.hero-title-row {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 24px;
  margin-bottom: 28px;
}
.hero-eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-mute);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.hero-title {
  font-size: 30px;
  font-weight: 600;
  letter-spacing: -0.02em;
  line-height: 1.1;
  margin: 0 0 8px;
  color: var(--ink);
}
.hero-sub { margin: 0; color: var(--ink-soft); font-size: 14px; max-width: 640px; }

.hero-legend {
  display: flex; gap: 16px;
  padding: 10px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
}
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--ink-soft); letter-spacing: 0.03em; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }
.legend-label { font-weight: 500; }
.legend-count { font-family: var(--font-mono); color: var(--ink-mute); }

.kpis {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}
.kpi {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
}
.kpi::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0; height: 3px;
  background: var(--kpi-accent, var(--border));
}
.kpi-red   { --kpi-accent: oklch(0.62 0.2 25); }
.kpi-amber { --kpi-accent: oklch(0.72 0.15 65); }
.kpi-blue  { --kpi-accent: oklch(0.6 0.17 248); }
.kpi-slate { --kpi-accent: oklch(0.7 0.02 250); }

.kpi-k {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ink-mute);
  font-weight: 500;
}
.kpi-row { display: flex; align-items: baseline; gap: 10px; margin-top: 10px; }
.kpi-v { font-size: 36px; font-weight: 600; letter-spacing: -0.02em; line-height: 1; }
.kpi-delta {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 999px;
  background: var(--bg-sunk);
  color: var(--ink-soft);
  display: inline-flex; align-items: center; gap: 4px;
}
.kpi-delta.d-up { background: color-mix(in oklab, var(--kpi-accent), white 80%); color: var(--kpi-accent); }
.kpi-delta-arrow { font-size: 9px; }
.kpi-sub { margin-top: 6px; font-size: 12px; color: var(--ink-mute); }

/* ---------- List header ---------- */
.list-head {
  padding: 32px 32px 16px;
  display: flex; justify-content: space-between; align-items: center;
  gap: 16px;
}
.list-head-l { display: flex; align-items: baseline; gap: 10px; }
.list-h { margin: 0; font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
.list-count {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--ink-mute);
  padding: 2px 8px;
  background: var(--bg-sunk);
  border-radius: 999px;
}
.list-head-r { display: flex; gap: 8px; align-items: center; }
.seg {
  display: inline-flex;
  background: var(--bg-sunk);
  padding: 3px;
  border-radius: 8px;
  border: 1px solid var(--border);
}
.seg button {
  padding: 5px 12px;
  font-size: 12px;
  color: var(--ink-mute);
  border-radius: 6px;
  font-weight: 500;
}
.seg .seg-on { background: var(--surface); color: var(--ink); box-shadow: 0 1px 2px rgb(0 0 0 / .04); }

.list-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  border-radius: 8px;
  font-size: 12px;
  color: var(--ink-soft);
}
.list-btn:hover { background: var(--bg-sunk); }

/* ---------- Grid ---------- */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
  padding: 0 32px 32px;
}
@media (max-width: 1240px) {
  .grid { grid-template-columns: 1fr; }
}

/* ---------- Verdict Card ---------- */
.vcard {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 22px 24px 18px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  cursor: pointer;
  transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease, opacity .2s;
  overflow: hidden;
}
.vcard:hover { box-shadow: var(--shadow-card); border-color: var(--border-strong); transform: translateY(-1px); }
.vcard-rail {
  position: absolute;
  top: 0; left: 0; bottom: 0;
  width: 3px;
  background: var(--rail);
}
.vcard.dim { opacity: 0.45; filter: saturate(0.7); }
.vcard.dim:hover { opacity: 0.85; }
.vcard.focus { box-shadow: 0 0 0 1px var(--rail), var(--shadow-card); }

.vcard-head { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
.vcard-head-l { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.vcard-name {
  margin: 0;
  font-size: 20px;
  font-weight: 600;
  letter-spacing: -0.02em;
}

.area-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 9px 3px 8px;
  border: 1px solid var(--border);
  border-radius: 999px;
  font-size: 11.5px;
  font-weight: 500;
  letter-spacing: 0.01em;
  background: #fff;
  white-space: nowrap;
}
.area-dot {
  width: 6px; height: 6px; border-radius: 999px;
  display: inline-block;
}

.threat-badge {
  font-size: 10px;
  letter-spacing: 0.1em;
  font-weight: 600;
  padding: 4px 9px 4px 8px;
  border-radius: 4px;
  border: 1px solid;
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--font-mono);
  text-transform: uppercase;
}
.threat-dot { width: 6px; height: 6px; border-radius: 50%; }

.vcard-meta {
  display: flex; align-items: center; gap: 12px;
  font-size: 11px;
  color: var(--ink-mute);
}
.vcard-meta-item { display: inline-flex; align-items: baseline; gap: 6px; }
.vcard-meta-k { text-transform: uppercase; letter-spacing: 0.06em; font-size: 10px; }
.vcard-meta-v { color: var(--ink); font-family: var(--font-mono); font-size: 12px; }
.vcard-meta-sep { color: var(--border-strong); }
.spark { color: currentColor; flex: 0 0 auto; }

.vcard-verdict {
  margin: 0;
  font-size: 14.5px;
  line-height: 1.55;
  color: var(--ink);
  text-wrap: pretty;
}

.vcard-action {
  background: color-mix(in oklab, var(--rail), white 90%);
  border: 1px solid color-mix(in oklab, var(--rail), white 75%);
  padding: 12px 14px;
  border-radius: var(--radius-md);
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.vcard-action-label {
  font-size: 10px;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: color-mix(in oklab, var(--rail), black 15%);
  font-weight: 600;
}
.vcard-action-body {
  font-size: 13.5px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.45;
  letter-spacing: -0.005em;
}

.vcard-signals {
  display: flex; flex-wrap: wrap; gap: 6px;
}
.signal-chip {
  font-size: 11.5px;
  padding: 3px 9px;
  border-radius: 999px;
  background: var(--bg-sunk);
  border: 1px solid var(--border);
  color: var(--ink-soft);
  display: inline-flex; align-items: center; gap: 5px;
  font-feature-settings: "tnum";
}
.signal-chip.hot {
  background: var(--blue-050);
  color: var(--blue-600);
  border-color: color-mix(in oklab, var(--blue-500), white 75%);
  font-weight: 500;
}
.signal-chip-bolt { font-size: 6px; line-height: 1; }

.vcard-foot {
  margin-top: 2px;
  padding-top: 14px;
  border-top: 1px dashed var(--border);
  display: flex; justify-content: space-between; gap: 16px; align-items: center;
}
.vcard-routes { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.vcard-routes-k {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--ink-mute); margin-right: 2px;
}
.route-tag {
  font-size: 10.5px;
  padding: 2px 7px;
  border-radius: 4px;
  color: var(--ink-mute);
  background: transparent;
  border: 1px solid var(--border);
  letter-spacing: 0.02em;
}
.route-tag.active {
  color: var(--navy-900);
  background: oklch(0.95 0.012 255);
  border-color: var(--border-strong);
  font-weight: 500;
}
.vcard-foot-r { display: flex; align-items: center; gap: 16px; font-size: 12px; }
.vcard-updated { color: var(--ink-mute); font-family: var(--font-mono); font-size: 11px; }
.vcard-brief { color: var(--blue-600); font-weight: 500; font-size: 12.5px; }
.vcard-brief:hover { text-decoration: underline; }

/* ---------- App footer ---------- */
.app-foot {
  padding: 24px 32px 32px;
  display: flex; justify-content: space-between;
  font-size: 11px; color: var(--ink-mute);
  font-family: var(--font-mono);
  letter-spacing: 0.02em;
}

/* ---------- Drawer (brief) ---------- */
.drw-wrap {
  position: fixed; inset: 0;
  background: oklch(0.2 0.02 255 / 0.35);
  backdrop-filter: blur(2px);
  z-index: 100;
  display: flex;
  animation: fadeIn .18s ease;
}
.drw-wrap-right { justify-content: flex-end; }
.drw-wrap:not(.drw-wrap-right) { justify-content: flex-end; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideR { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

.drw, .chat {
  width: min(540px, 92vw);
  height: 100vh;
  background: var(--surface);
  box-shadow: var(--shadow-pop);
  display: flex; flex-direction: column;
  animation: slideR .22s cubic-bezier(.2,.7,.2,1);
  position: relative;
  overflow: visible;
}
.drw-rail {
  position: absolute;
  top: 0; left: 0; bottom: 0; width: 3px;
  background: var(--rail);
}

.drw-head, .chat-head {
  padding: 24px 28px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 2;
  background: var(--surface);
}
.drw-eyebrow, .chat-eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-mute);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.drw-title, .chat-title {
  margin: 0;
  font-size: 24px;
  font-weight: 600;
  letter-spacing: -0.02em;
}
.drw-sub { display: flex; align-items: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.drw-updated { font-size: 11px; font-family: var(--font-mono); color: var(--ink-mute); }
.drw-close {
  padding: 6px;
  border-radius: 6px;
  color: var(--ink-mute);
}
.drw-close:hover { background: var(--bg-sunk); color: var(--ink); }

.drw {
  overflow-y: auto;
  overflow-x: visible;
}
.drw-sec { padding: 20px 28px; border-bottom: 1px solid var(--border); overflow: visible; }
.drw-h {
  margin: 0 0 10px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-mute);
  font-weight: 600;
}
.drw-p { margin: 0; font-size: 14.5px; line-height: 1.6; color: var(--ink); text-wrap: pretty; }
.drw-action-sec { background: color-mix(in oklab, var(--rail), white 94%); border-bottom-color: color-mix(in oklab, var(--rail), white 80%); }
.drw-p-action { font-weight: 600; font-size: 15px; }

.drw-sig { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; }
.drw-sig-li {
  display: grid; grid-template-columns: 8px 1fr auto;
  gap: 12px; align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.drw-sig-li:last-child { border-bottom: 0; }
.drw-sig-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border-strong); }
.drw-sig-hot .drw-sig-dot { background: var(--blue-500); }
.drw-sig-hot .drw-sig-label { font-weight: 500; }
.drw-sig-weight { font-family: var(--font-mono); font-size: 11px; color: var(--ink-mute); }
.drw-sig-hot .drw-sig-weight { color: var(--blue-600); }

.drw-routes { display: flex; flex-wrap: wrap; gap: 6px; }

.drw-tl { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 10px; }
.drw-tl li { display: grid; grid-template-columns: 60px 1fr; gap: 12px; font-size: 13px; }
.drw-tl-dt { font-family: var(--font-mono); font-size: 11px; color: var(--ink-mute); padding-top: 1px; }
.drw-tl-t { color: var(--ink-soft); }

.drw-source-list { display: flex; flex-direction: column; }
.drw-source-chip {
  display: grid; grid-template-columns: 72px 1fr 52px; align-items: baseline; gap: 8px;
  padding: 6px 0; border-bottom: 1px solid var(--border);
  text-decoration: none; color: var(--ink-soft); font-size: 12.5px; line-height: 1.4;
}
.drw-source-chip:last-child { border-bottom: 0; }
.drw-source-chip:hover { color: var(--ink); }
.drw-source-type { font-family: var(--font-mono); font-size: 10px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.04em; }
.drw-source-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.drw-source-date { font-family: var(--font-mono); font-size: 10px; color: var(--ink-mute); text-align: right; }
.drw-classification { font-family: var(--font-mono); font-size: 10px; color: var(--ink-mute); border: 1px solid var(--border); border-radius: 3px; padding: 1px 5px; letter-spacing: 0.03em; }

/* ---------- Chat drawer ---------- */
.chat { }
.chat-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px 28px;
  display: flex; flex-direction: column; gap: 16px;
  background: var(--bg-sunk);
}
.chat-msg { display: flex; gap: 10px; align-items: flex-end; max-width: 86%; }
.chat-user { margin-left: auto; flex-direction: row-reverse; }
.chat-avatar {
  width: 24px; height: 24px; border-radius: 6px;
  background: var(--navy-900); color: #fff;
  display: grid; place-items: center;
  font-size: 10px; font-weight: 600;
  flex: 0 0 24px;
}
.chat-bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 13.5px;
  line-height: 1.55;
  color: var(--ink);
  text-wrap: pretty;
}
.chat-user .chat-bubble { background: var(--navy-900); color: #fff; border-color: var(--navy-900); }
.chat-typing { display: flex; gap: 4px; }
.chat-typing span {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--ink-mute);
  animation: bouncy 1s infinite ease-in-out;
}
.chat-typing span:nth-child(2) { animation-delay: .15s; }
.chat-typing span:nth-child(3) { animation-delay: .3s; }
@keyframes bouncy { 0%, 80%, 100% { transform: translateY(0); opacity: 0.4; } 40% { transform: translateY(-4px); opacity: 1; } }

.chat-sugs { display: flex; gap: 6px; padding: 10px 20px; border-top: 1px solid var(--border); overflow-x: auto; }
.chat-sug {
  flex: 0 0 auto;
  font-size: 11.5px;
  padding: 5px 10px;
  border: 1px solid var(--border);
  border-radius: 999px;
  color: var(--ink-soft);
  white-space: nowrap;
  background: var(--surface);
}
.chat-sug:hover { background: var(--bg-sunk); }

.chat-form {
  display: flex; gap: 8px;
  padding: 12px 20px 20px;
  border-top: 1px solid var(--border);
  background: var(--surface);
}
.chat-input {
  flex: 1;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  outline: 0;
  transition: border-color .15s, box-shadow .15s;
}
.chat-input:focus {
  border-color: var(--blue-500);
  box-shadow: 0 0 0 3px color-mix(in oklab, var(--blue-500), transparent 85%);
}
.chat-send {
  padding: 10px 16px;
  border-radius: 8px;
  background: var(--navy-900);
  color: #fff;
  font-size: 13px;
  font-weight: 500;
}
.chat-send:disabled { background: var(--ink-mute); cursor: not-allowed; }

/* ---------- Lens-active subtle treatment ---------- */
.grid.lens-active .vcard:not(.dim)::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: var(--radius-lg);
  pointer-events: none;
  box-shadow: inset 0 0 0 1px color-mix(in oklab, var(--rail), transparent 70%);
}

/* ---------- Scrollbar tidy-up ---------- */
.sb::-webkit-scrollbar, .drw::-webkit-scrollbar, .chat-body::-webkit-scrollbar { width: 8px; }
.sb::-webkit-scrollbar-thumb { background: oklch(0.3 0.03 255); border-radius: 4px; }
.drw::-webkit-scrollbar-thumb, .chat-body::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

/* ---------- Multi-page sidebar nav ---------- */
.sb-nav-pages { margin-bottom: 14px; }
.sb-nav-pages + .sb-sec-label { margin-top: 4px; }

/* ---------- Toolbar (pages) ---------- */
.toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 20px;
  flex-wrap: wrap;
}
.toolbar-count {
  margin-left: auto;
  color: var(--ink-mute);
  font-size: 12px;
  font-variant-numeric: tabular-nums;
}

/* ---------- Launches & Events — timeline ---------- */
.tl {
  padding: 0 40px 40px 40px;
  display: flex;
  flex-direction: column;
  gap: 28px;
}
.tl-group {}
.tl-group-head {
  display: flex;
  align-items: baseline;
  gap: 10px;
  padding: 10px 0 12px 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 12px;
  position: sticky;
  top: 56px;
  background: var(--bg);
  z-index: 1;
}
.tl-group-h {
  margin: 0;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.02em;
  color: var(--ink);
  text-transform: uppercase;
}
.tl-group-count {
  font-size: 11px;
  color: var(--ink-mute);
  background: var(--bg-sunk);
  border: 1px solid var(--border);
  padding: 1px 7px;
  border-radius: 999px;
  font-variant-numeric: tabular-nums;
}
.tl-items {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.tl-card {
  display: grid;
  grid-template-columns: 130px 1fr auto;
  gap: 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px 18px;
  cursor: pointer;
  transition: border-color .15s, box-shadow .15s, transform .15s;
}
.tl-card:hover {
  border-color: var(--border-strong);
  box-shadow: var(--shadow-card);
}
.tl-event { border-left: 3px solid var(--blue-500); padding-left: 15px; }
.tl-launch {}

/* Show full year / past divider */
.tl-expand-row {
  display: flex;
  justify-content: center;
  padding: 8px 0 4px;
}
.tl-expand-btn {
  background: var(--bg-sunk);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 7px 22px;
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-soft);
  cursor: pointer;
  letter-spacing: 0.02em;
  transition: background .15s, color .15s, border-color .15s;
}
.tl-expand-btn:hover {
  background: var(--surface);
  border-color: var(--border-strong);
  color: var(--ink);
}
.tl-past-divider {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 0 4px;
}
.tl-past-divider::before,
.tl-past-divider::after {
  content: "";
  flex: 1;
  height: 1px;
  background: var(--border);
}
.tl-past-divider-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-mute);
  white-space: nowrap;
}

/* ---------- View mode: compact list ---------- */
.tl-list {
  padding: 0 40px 40px;
}
.tl-list-hdr {
  display: grid;
  grid-template-columns: 115px 1fr 110px 125px 110px;
  gap: 14px;
  padding: 0 6px 8px;
  border-bottom: 2px solid var(--border);
  margin-bottom: 2px;
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink-mute);
}
.tl-list-divider {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 0 6px;
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink-mute);
}
.tl-list-divider::before, .tl-list-divider::after {
  content: ""; flex: 1; height: 1px; background: var(--border);
}
.tl-list-row {
  display: grid;
  grid-template-columns: 115px 1fr 110px 125px 110px;
  gap: 14px;
  align-items: center;
  padding: 7px 6px;
  border-radius: 6px;
  cursor: pointer;
  transition: background .1s;
}
.tl-list-row:hover { background: var(--bg-sunk); }
.tl-list-co {
  font-size: 12.5px; font-weight: 600; color: var(--ink);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.tl-list-title {
  font-size: 13px; color: var(--ink);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.tl-list-type { font-size: 11px; }
.tl-list-date { font-family: var(--font-mono); font-size: 11.5px; color: var(--ink-soft); white-space: nowrap; }

/* ---------- View mode: company card grid ---------- */
.co-grid {
  padding: 0 40px 40px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}
.co-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: 3px solid var(--border-strong);
  border-radius: var(--radius-lg);
  padding: 20px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 10px;
  transition: box-shadow .15s, transform .1s;

}
.co-card:hover {
  box-shadow: var(--shadow-pop);
  transform: translateY(-2px);
}
.co-card-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -0.02em;
}
.co-card-counts {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.co-card-count-chip {
  font-size: 11.5px;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: 99px;
  border: 1px solid var(--border);
  color: var(--ink-soft);
  background: var(--bg-sunk);
}
.co-card-high {
  font-size: 11px;
  font-weight: 600;
  color: oklch(0.50 0.13 65);
  background: oklch(0.97 0.035 70);
  border: 1px solid oklch(0.9 0.06 70);
  padding: 2px 8px;
  border-radius: 4px;
  width: fit-content;
}
/* ---------- Company signal modal ---------- */
.co-modal-backdrop {
  position: fixed;
  inset: 0;
  background: oklch(0.22 0.02 255 / 0.45);
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 16px;
  backdrop-filter: blur(2px);
}
.co-modal {
  background: var(--surface);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-pop);
  width: 700px;
  max-width: 100%;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.co-modal-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.co-modal-head-l {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.co-modal-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -0.02em;
}
.co-modal-close {
  width: 32px; height: 32px;
  border-radius: 50%;

}
.co-modal-close:hover { background: var(--bg-sunk); color: var(--ink); }
.co-modal-body {
  overflow-y: auto;
  flex: 1;
  padding: 8px 0;
}
.co-modal-row {
  display: grid;
  grid-template-columns: 96px 1fr auto;
  align-items: start;
  gap: 12px;
  padding: 12px 24px;
  border-bottom: 1px solid var(--border);
  transition: background .1s;
}
.co-modal-row:last-child { border-bottom: 0; }
.co-modal-row:hover { background: var(--blue-050); }
.co-modal-date { font-family: var(--font-mono); font-size: 11px; color: var(--ink-mute); padding-top: 2px; }
.co-modal-ititle { font-size: 13px; font-weight: 500; color: var(--ink); line-height: 1.45; }
.co-modal-meta { display: flex; gap: 6px; align-items: center; flex-shrink: 0; padding-top: 1px; }

/* ---------- Legacy tl-grouped (kept for backward compat) ---------- */
.tl-grouped {
  padding: 0 40px 40px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.tl-co-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.tl-co-head {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 18px;
  background: var(--bg-sunk);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .15s;
  user-select: none;
}
.tl-co-head:hover { background: oklch(0.95 0.008 255); }
.tl-co-name { font-size: 13.5px; font-weight: 600; color: var(--ink); }
.tl-co-count { font-size: 12px; color: var(--ink-mute); margin-left: auto; }
.tl-co-chevron { font-size: 10px; color: var(--ink-mute); }
.tl-co-item {

}
.tl-co-item:last-child { border-bottom: 0; }
.tl-co-item:hover { background: var(--blue-050); }
.tl-co-item-date { font-family: var(--font-mono); font-size: 11px; color: var(--ink-mute); }
.tl-co-item-title { font-size: 13px; font-weight: 500; color: var(--ink); }
.tl-co-item-meta { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }

/* ---------- View switcher ---------- */
.view-seg { margin-left: auto; }

.tl-card-l {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding-top: 2px;
}
.tl-date {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--ink-soft);
  letter-spacing: -0.01em;
}
.tl-card-body {
  min-width: 0;
}
.tl-card-head {
  display: flex;

  gap: 6px;
  margin-bottom: 8px;
}
.tl-title {
  margin: 0;

  letter-spacing: -0.01em;

.tl-card-meta {

}
.tl-company {
  font-weight: 600;

}
.type-tag {

}
.tl-type-event {
  font-size: 10.5px;
  font-weight: 600;
  color: var(--blue-600);
  background: var(--blue-050);
  border: 1px solid var(--blue-100);

}
.tl-summary {

}
.tl-action {

}
.tl-action-k {

}
.tl-action-v {
  color: var(--ink);
}
.tl-tags {

}
.tl-tag {

.tl-card-r {

/* ---------- Companies table ---------- */
.ctable {
  margin: 0 40px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.ctable-head {
  display: grid;
  grid-template-columns: 1.3fr 1.3fr 1fr 1fr 0.7fr 1.4fr 2fr 0.3fr;

.ctable-num {

.ctable-focus {

}
.ctable-dir {

.ctable-arrow {

.drw-roadmap-title {

  font-weight: 600;
  color: var(--ink);
  letter-spacing: -0.01em;

  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 80px;
}
.drw-roadmap-meta .drw-roadmap-k {

  <!-- Components (atoms + VerdictCard) -->
  <script type="text/babel">
// Verdict Card + small UI atoms
const { useState, useMemo, useEffect, useRef } = React;
const THREAT = window.THREAT;

function ThreatBadge({ level }) {
  const t = THREAT[level];
  return (
    <span className="threat-badge" style={{ color: t.fg, background: t.bg, borderColor: t.bd }}>
      <span className="threat-dot" style={{ background: t.dot }} />
      {t.label}
    </span>
  );
}

function AreaBadge({ children }) {
  const a = window.AREA[children];
  const style = a ? { color: a.fg, background: a.bg, borderColor: a.bd } : undefined;
  return (
    <span className="area-badge" style={style}>
      {a && <span className="area-dot" style={{ background: a.dot }} />}
      {children}
    </span>
  );
}

function SignalChip({ label, hot }) {
  return (
    <span className={"signal-chip" + (hot ? " hot" : "")}>
      {hot && <span className="signal-chip-bolt" aria-hidden>●</span>}
      {label}
    </span>
  );
}

function RouteTag({ label, active }) {
  return <span className={"route-tag" + (active ? " active" : "")}>{label}</span>;
}

// Small sparkline showing threat score trend (fake deterministic series)
function Spark({ seed = 1, color = "currentColor" }) {
  const pts = useMemo(() => {
    const out = [];
    let v = 40 + (seed % 20);
    for (let i = 0; i < 14; i++) {
      v += ((Math.sin(i * (1 + (seed % 5) * 0.1)) + Math.cos(seed + i)) * 6);
      v = Math.max(8, Math.min(92, v));
      out.push(v);
    }
    return out;
  }, [seed]);
  const w = 72, h = 22;
  const d = pts.map((p, i) => {
    const x = (i / (pts.length - 1)) * w;
    const y = h - (p / 100) * h;
    return (i === 0 ? "M" : "L") + x.toFixed(1) + "," + y.toFixed(1);
  }).join(" ");
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} className="spark">
      <path d={d} fill="none" stroke={color} strokeWidth="1.25" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

// Intensity badge (HIGH/MEDIUM/LOW)
function IntensityBadge({ level }) {
  const colors = {
    HIGH:   { fg:"oklch(0.48 0.18 25)",  bg:"oklch(0.96 0.04 25)",  bd:"oklch(0.88 0.10 25)",  dot:"oklch(0.58 0.20 25)" },
    MEDIUM: { fg:"oklch(0.44 0.13 245)", bg:"oklch(0.97 0.03 245)", bd:"oklch(0.88 0.06 245)", dot:"oklch(0.58 0.15 245)" },
    LOW:    { fg:"oklch(0.48 0.01 250)", bg:"oklch(0.97 0.005 250)",bd:"oklch(0.90 0.01 250)", dot:"oklch(0.68 0.01 250)" },
  };
  const c = colors[level] || colors.LOW;
  return (
    <span className="intensity-badge" style={{ color: c.fg, background: c.bg, borderColor: c.bd }}>
      <span className="intensity-dot" style={{ background: c.dot }} />
      {level}
    </span>
  );
}

// --- Verdict Card --------------------------------------------------------
function VerdictCard({ c, lens, onOpen }) {
  const t = THREAT[c.threat];
  const verdict = c.verdict[lens] || c.verdict.All;
  const action = c.action[lens] || c.action.All;

  // Sort signals by weight for current lens — top 4 stay visible
  const signals = useMemo(() => {
    return [...c.signals]
      .map(s => ({ ...s, w: (s.weight[lens] ?? s.weight.All ?? 0) }))
      .sort((a, b) => b.w - a.w);
  }, [c, lens]);

  const lensIsTeam = lens !== "All";
  const lensTouches = c.routes.includes(lens);

  // Dim state when a team lens is active and this card doesn't route there
  const dim = lensIsTeam && !lensTouches;

  return (
    <article
      className={"vcard" + (dim ? " dim" : "") + (lensIsTeam && lensTouches ? " focus" : "")}
      style={{ "--rail": t.rail }}
      onClick={() => onOpen(c.id)}
    >
      <span className="vcard-rail" aria-hidden />

      <header className="vcard-head">
        <div className="vcard-head-l">
          <h3 className="vcard-name">{c.name}</h3>
          <div style={{display:"flex", gap:"6px", flexWrap:"wrap", alignItems:"center"}}>
            {(c.areas && c.areas.length ? c.areas : [c.area]).map(a =>
              <AreaBadge key={a}>{a}</AreaBadge>
            )}
            {c.battlecardUrl ? (
              <a href={c.battlecardUrl} target="_blank" rel="noopener noreferrer"
                 onClick={e => e.stopPropagation()}
                 style={{
                   fontSize:"10px", padding:"2px 8px", borderRadius:"10px",
                   background:"rgba(99,102,241,0.15)", color:"#818cf8",
                   border:"1px solid rgba(99,102,241,0.35)", textDecoration:"none",
                   fontWeight:600, letterSpacing:"0.02em",
                 }}>📋 Battlecard</a>
            ) : null}
          </div>
        </div>
        <div className="vcard-head-r">
          <ThreatBadge level={c.threat} />
        </div>
      </header>

      <div className="vcard-meta">
        <span className="vcard-meta-item">
          <span className="vcard-meta-k">Threat score</span>
          <span className="vcard-meta-v">{c.score}</span>
        </span>
        <Spark seed={c.score} color={t.rail} />
        <span className="vcard-meta-sep" aria-hidden>·</span>
        <span className="vcard-meta-item">
          <span className="vcard-meta-k">Lens</span>
          <span className="vcard-meta-v">{lens}</span>
        </span>
      </div>

      <p className="vcard-verdict">{verdict}</p>

      <div className="vcard-action">
        <span className="vcard-action-label">Actian action</span>
        <span className="vcard-action-body">{action}</span>
      </div>

      <div className="vcard-signals">
        {signals.map((s, i) => (
          <SignalChip key={s.label} label={s.label} hot={s.w >= 2} />
        ))}
      </div>

      <footer className="vcard-foot">
        <div className="vcard-routes">
          <span className="vcard-routes-k">Routes to</span>
          {window.TEAMS.filter(x => x !== "All").map(team => (
            <RouteTag key={team} label={team} active={c.routes.includes(team)} />
          ))}
        </div>
        <div className="vcard-foot-r">
          <span className="vcard-updated">Updated {c.updated}</span>
          <a className="vcard-brief" onClick={(e) => { e.stopPropagation(); onOpen(c.id); }}>
            View full brief <span aria-hidden>↗</span>
          </a>
        </div>
      </footer>
    </article>
  );
}

Object.assign(window, { VerdictCard, ThreatBadge, AreaBadge, SignalChip, RouteTag, THREAT, Spark, IntensityBadge });
  </script>

const BACKEND_URL = "https://ci-scraper-1.onrender.com";

function renderMd(raw) {
  // Escape HTML entities, then apply lightweight markdown transforms
  let s = raw
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
  // Bold/italic first — must span newlines (use [\s\S] instead of .)
  s = s.replace(/\*\*([\s\S]+?)\*\*/g, "<strong>$1</strong>");
  s = s.replace(/(^|[^*])\*([^*\n]+?)\*(?!\*)/g, "$1<em>$2</em>");
  // Then per-line transforms (headings, bullets)
  const lines = s.split("\n");
  const out = [];
  for (const line of lines) {
    let l = line;
    l = l.replace(/^#{1,3}\s+(.+)$/, "<strong style='display:block;margin-top:6px'>$1</strong>");
    l = l.replace(/^[-*]\s+(.+)$/, "&#8226;&nbsp;$1");
    out.push(l);
  }
  return out.join("<br>");
}

function ChatDrawer({ open, onClose, lens }) {
  const [messages, setMessages] = useState([
    { role: "ai", text: `Hi — I've got the full ${lens} lens loaded. Ask me about any competitor, signal, or action.` },
  ]);
  const [history, setHistory] = useState([]);
  const [input, setInput] = useState("");
  const [busy, setBusy] = useState(false);
  const [warming, setWarming] = useState(false);
  const bodyRef = useRef(null);

  useEffect(() => {
    if (bodyRef.current) bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
  }, [messages, busy, warming]);

  async function send(q) {
    const text = (q ?? input).trim();
    if (!text) return;
    setInput("");
    const next = [...messages, { role: "user", text }];
    setMessages(next);
    setBusy(true);
    setWarming(false);
    const warmTimer = setTimeout(() => setWarming(true), 5000);
    try {
      const res = await fetch(`${BACKEND_URL}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, history }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || `HTTP ${res.status}`);
      }
      const data = await res.json();
      const reply = data.message || "No response received.";
      setMessages(m => [...m, { role: "ai", text: reply }]);
      setHistory(h => [...h,
        { role: "user", content: text },
        { role: "assistant", content: reply },
      ]);
    } catch (e) {
      setMessages(m => [...m, { role: "ai", text: `Couldn't reach the assistant — ${e.message}` }]);
    } finally {
      clearTimeout(warmTimer);
      setWarming(false);
      setBusy(false);
    }
  }

  if (!open) return null;

  const suggestions = [
    "Which competitor is most urgent this week?",
    "Summarize Atlan's threat in one line",
    "What actions are due before May 1?",
  ];

  return (
    <div className="drw-wrap drw-wrap-right" onClick={onClose}>
      <aside className="chat" onClick={e => e.stopPropagation()}>
        <header className="chat-head">
          <div>
            <div className="chat-eyebrow">Ask CI · {lens} lens</div>
            <h2 className="chat-title">Intelligence assistant</h2>
          </div>
          <button className="drw-close" onClick={onClose} aria-label="Close">
            <svg width="14" height="14" viewBox="0 0 14 14"><path d="M3 3 L11 11 M11 3 L3 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>
          </button>
        </header>

        <div className="chat-body" ref={bodyRef}>
          {messages.map((m, i) => (
            <div key={i} className={"chat-msg chat-" + m.role}>
              {m.role === "ai" && <div className="chat-avatar">CI</div>}
              {m.role === "ai"
                ? <div className="chat-bubble" dangerouslySetInnerHTML={{ __html: renderMd(m.text) }} />
                : <div className="chat-bubble">{m.text}</div>
              }
            </div>
          ))}
          {busy && (
            <div className="chat-msg chat-ai">
              <div className="chat-avatar">CI</div>
              <div className="chat-bubble chat-typing"><span/><span/><span/></div>
            </div>
          )}
          {warming && (
            <div className="chat-msg chat-ai">
              <div className="chat-avatar">CI</div>
              <div className="chat-bubble" style={{ fontStyle: "italic", opacity: 0.75, fontSize: "13px" }}>
                Warming up backend — first request can take ~50s on the free tier.
              </div>
            </div>
          )}
        </div>

        <div className="chat-sugs">
          {suggestions.map(s => (
            <button key={s} className="chat-sug" onClick={() => send(s)}>{s}</button>
          ))}
        </div>

        <form className="chat-form" onSubmit={e => { e.preventDefault(); send(); }}>
          <input
            className="chat-input"
            placeholder="Ask about any competitor, signal, or action…"
            value={input}
            onChange={e => setInput(e.target.value)}
          />
          <button className="chat-send" type="submit" disabled={busy || !input.trim()}>Send</button>
        </form>
      </aside>
    </div>
  );
}

function LaunchesPage({ lens, onOpenCompany, q }) {
  const [filter, setFilter]           = useStateP("all");       // all | launches | events
  const [rel, setRel]                 = useStateP("all");       // all | HIGH | MEDIUM | LOW
  const [viewMode, setViewMode]       = useStateP("card");      // card | compact | grouped
  const [selectedCo, setSelectedCo]   = useStateP(null);        // company name for modal

  const now = new Date();
  const cutoff365   = new Date(now); cutoff365.setDate(now.getDate() + 365);  // Full year ahead
  const cutoffPast45 = new Date(now); cutoffPast45.setDate(now.getDate() - 45); // Last 45 days

  const needle = (q || "").trim().toLowerCase();
  const matchQ = (it) => {
    if (!needle) return true;
    const blob = [it.company, it.title, it.name, it.summary, it.why, (it.themes || []).join(" "), (it.tags || []).join(" "), it.area]
      .filter(Boolean).join(" ").toLowerCase();
    return blob.includes(needle);
  };

  const allItems = useMemoP(() => {
    const items = [];
    for (const l of window.LAUNCHES) items.push({ kind:"launch", ...l });
    for (const e of window.EVENTS)   items.push({ kind:"event",  ...e, title:e.name, summary:e.why });
    return items
      .filter(it => filter === "all" || (filter === "launches" && it.kind === "launch") || (filter === "events" && it.kind === "event"))
      .filter(it => rel === "all" || it.relevance === rel)
      .filter(matchQ);
  }, [filter, rel, needle]);

  // ── Card view data ──
  const upcomingAll = useMemoP(() =>
    allItems.filter(it => new Date(it.date) >= now).sort((a,b) => new Date(a.date) - new Date(b.date)),
    [allItems]
  );
  const upcoming365    = useMemoP(() => upcomingAll.filter(it => new Date(it.date) <= cutoff365), [upcomingAll]);
  const past45         = useMemoP(() =>
    allItems.filter(it => new Date(it.date) < now && new Date(it.date) >= cutoffPast45)
            .sort((a,b) => new Date(b.date) - new Date(a.date)), [allItems]);

  const upcoming365Groups = useMemoP(() => groupByWeek(upcoming365), [upcoming365]);
  const past45Groups      = useMemoP(() => groupByWeek(past45),       [past45]);

  // ── Compact list data — upcoming asc, then past45 desc ──
  const compactItems = useMemoP(() => {
    const upcoming = allItems.filter(it => new Date(it.date) >= now)
                             .sort((a,b) => new Date(a.date) - new Date(b.date));
    const pastItems = allItems.filter(it => new Date(it.date) < now && new Date(it.date) >= cutoffPast45)
                              .sort((a,b) => new Date(b.date) - new Date(a.date));
    return { upcoming, pastItems };
  }, [allItems]);

  // ── Grouped by company — sorted alphabetically ──
  const groupedByCompany = useMemoP(() => {
    const map = {};
    for (const it of allItems) {
      if (!map[it.company]) map[it.company] = [];
      map[it.company].push(it);
    }
    return Object.entries(map)
      .map(([company, items]) => ({
        company,
        items: items.sort((a,b) => new Date(a.date) - new Date(b.date))
      }))
      .sort((a,b) => a.company.localeCompare(b.company));
  }, [allItems]);

  // ── Selected company items for modal ──
  const selectedCoItems = useMemoP(() => {
    if (!selectedCo) return [];
    const g = groupedByCompany.find(g => g.company === selectedCo);
    return g ? g.items : [];
  }, [selectedCo, groupedByCompany]);

  const visibleCount = upcoming365.length + past45.length;
  const totalCount   = allItems.length;

  return (
    <div data-screen-label="02 Launches & events">
      <div className="hero">
        <div className="hero-title-row">
          <div>
            <div className="hero-eyebrow">Signal timeline · next 365 days + past 45 days</div>
            <h1 className="hero-title">Launches & events</h1>
            <p className="hero-sub">
              {window.LAUNCHES.length} launches tracked · {window.EVENTS.length} events on the radar. Filter by type or relevance; click a company to jump to its brief.
            </p>
          </div>
          <div className="hero-legend">
            {["HIGH","MEDIUM","LOW"].map(l => (
              <span key={l} className="legend-item">
                <span className="legend-dot" style={{ background: REL[l].dot }} />
                <span className="legend-label">{l}</span>
              </span>
            ))}
          </div>
        </div>

        <div className="toolbar">
          {/* Type filter */}
          <div className="seg">
            <button className={filter === "all"     ? "seg-on" : ""} onClick={() => setFilter("all")}>All</button>
            <button className={filter === "launches" ? "seg-on" : ""} onClick={() => setFilter("launches")}>Launches</button>
            <button className={filter === "events"   ? "seg-on" : ""} onClick={() => setFilter("events")}>Events</button>
          </div>
          {/* Relevance filter */}
          <div className="seg">
            <button className={rel === "all"    ? "seg-on" : ""} onClick={() => setRel("all")}>Any relevance</button>
            <button className={rel === "HIGH"   ? "seg-on" : ""} onClick={() => setRel("HIGH")}>High</button>
            <button className={rel === "MEDIUM" ? "seg-on" : ""} onClick={() => setRel("MEDIUM")}>Medium</button>
            <button className={rel === "LOW"    ? "seg-on" : ""} onClick={() => setRel("LOW")}>Low</button>
          </div>
          {/* View switcher — pushed to the right */}
          <div className="seg view-seg">
            <button className={viewMode === "card"    ? "seg-on" : ""} onClick={() => setViewMode("card")}    title="Timeline card view">⊟ Cards</button>
            <button className={viewMode === "compact" ? "seg-on" : ""} onClick={() => setViewMode("compact")} title="Compact list view">☰ List</button>
            <button className={viewMode === "grouped" ? "seg-on" : ""} onClick={() => setViewMode("grouped")} title="Group by company">⊞ By company</button>
          </div>
          <span className="toolbar-count" style={{ marginLeft:0 }}>
            {viewMode === "card" ? visibleCount : totalCount} items
          </span>
        </div>
      </div>

      {/* ══ CARD VIEW (default) ══ */}
      {viewMode === "card" && (
        <div className="tl">
          {upcoming365Groups.map(g => <TlGroup key={g.key} g={g} onOpenCompany={onOpenCompany} />)}

          {past45.length > 0 && (
            <div className="tl-past-divider">
              <span className="tl-past-divider-label">Past 45 days</span>
            </div>
          )}
          {past45Groups.map(g => <TlGroup key={g.key} g={g} onOpenCompany={onOpenCompany} />)}
        </div>
      )}

      {/* ══ COMPACT LIST VIEW ══ */}
      {viewMode === "compact" && (
        <div className="tl-list">
          <div className="tl-list-hdr">
            <span>Company</span><span>Title</span><span>Type</span><span>Date</span><span>Actions</span>

    </div>
  );
}

function weekLabel(d) {
  const now = new Date();
  const diffDays = Math.round((d - now) / 86400000);
  const abs = Math.abs(diffDays);
  const wk = Math.floor(abs / 7);
  const weekStart = new Date(d);
  weekStart.setDate(d.getDate() - d.getDay());
  const monthLbl = weekStart.toLocaleDateString("en-US",{ month:"long", day:"numeric", year:"numeric" });
  if (diffDays > 7)  return `Upcoming · week of ${monthLbl}`;
  if (diffDays > 0)  return `This week · ${monthLbl}`;
  if (diffDays === 0) return `Today · ${monthLbl}`;
  if (abs < 7)       return `Last week · ${monthLbl}`;
  return `${wk} weeks ago · ${monthLbl}`;
}

function companyIdByName(name) {
  const c = window.COMPETITORS.find(x => x.name.toLowerCase() === name.toLowerCase());
  return c ? c.id : null;
}

    layoff:         "📉 Layoff",

  };
  const TYPE_COLORS = {
    product_launch: "oklch(0.60 0.17 248)",
    feature:        "oklch(0.65 0.14 200)",
    funding:        "oklch(0.62 0.20 25)",
    leadership:     "oklch(0.50 0.13 65)",
    partnership:    "oklch(0.56 0.14 270)",
    acquisition:    "oklch(0.55 0.18 340)",
    pricing:        "oklch(0.72 0.15 65)",
    layoff:         "oklch(0.55 0.14 30)",
    product:        "oklch(0.60 0.17 248)",
  };

  // Strict filter: kept news is only the signal types (includes legacy "product" alias)
  const KEEP = new Set(Object.keys(TYPE_LABELS));
  let filtered = (window.NEWS || []).filter(n => KEEP.has(n.news_type));
  if (typeFilter !== "all") {
    // "product_launch" filter also matches legacy "product" items
    filtered = filtered.filter(n =>
      n.news_type === typeFilter ||
      (typeFilter === "product_launch" && n.news_type === "product")

  if (needle) {

      const blob = [n.company, n.title, n.summary, (n.themes || []).join(" "), (n.tags || []).join(" "), n.news_type]
        .filter(Boolean).join(" ").toLowerCase();
      return blob.includes(needle);
    });
  }

  // Group by company, sort groups by most-recent item first
  const byCompany = {};
  for (const n of filtered) {
    (byCompany[n.company] = byCompany[n.company] || []).push(n);
  }
  const companyOrder = Object.keys(byCompany).sort((a, b) => {
    const la = byCompany[a].reduce((m, x) => Math.max(m, new Date(x.published_date || 0).getTime()), 0);
    const lb = byCompany[b].reduce((m, x) => Math.max(m, new Date(x.published_date || 0).getTime()), 0);
    return lb - la;
  });
  for (const c of companyOrder) {
    byCompany[c].sort((a, b) => new Date(b.published_date || 0) - new Date(a.published_date || 0));
  }

  // Type counts for the filter bar — reflect lens + company + search filters,
  // but NOT the type filter itself (so user can see what's available per type).
  // This keeps pill counts honest with what's actually visible.
  const typeCounts = {};
  for (const n of (window.NEWS || [])) {
    if (!KEEP.has(n.news_type)) continue;
    if (companyFilter !== "all" && n.company !== companyFilter) continue;
    if (lens !== "All" && !(n.team_routing || []).includes(lens)) continue;
    if (needle) {
      const blob = [n.company, n.title, n.summary, (n.themes || []).join(" "), (n.tags || []).join(" "), n.news_type]
        .filter(Boolean).join(" ").toLowerCase();
      if (!blob.includes(needle)) continue;

    const key = n.news_type === "product" ? "product_launch" : n.news_type;
    typeCounts[key] = (typeCounts[key] || 0) + 1;
  }
  // All companies that have any kept news (for company filter dropdown) — also lens-aware
  const allCompaniesWithNews = Array.from(new Set(
    (window.NEWS || [])
      .filter(n => KEEP.has(n.news_type))
      .filter(n => lens === "All" || (n.team_routing || []).includes(lens))
      .map(n => n.company)
  )).sort();

  function toggle(company) {
    setCollapsed(prev => ({ ...prev, [company]: !prev[company] }));
  }

  return (
    <div data-screen-label="04 News">
      <div className="hero">
        <div className="hero-title-row">
          <div>
            <div className="hero-eyebrow">Press releases · 60-day rolling window · strict signal filter</div>
            <h1 className="hero-title">News</h1>
            <p className="hero-sub">
              Only what matters: product launches, funding, leadership changes, partnerships, acquisitions, major features.
              Grouped by company, newest first. {filtered.length} items across {companyOrder.length} companies.
            </p>
          </div>
        </div>

        {/* 2-row wrapping filter bar */}
        <div style={{ marginTop: "20px", display: "flex", flexDirection: "column", gap: "10px" }}>
          {/* Row 1 — signal types (wrap-safe chips) */}
          <div style={{ display: "flex", flexWrap: "wrap", gap: "6px", alignItems: "center" }}>
            <span style={{ fontSize: "11px", color: "var(--ink-mute)", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.06em", marginRight: "4px" }}>Type</span>
            {[{k:"all",label:"All signals"}, ...["product_launch","feature","funding","leadership","partnership","acquisition","pricing","layoff"].filter(t => typeCounts[t]).map(t => ({k:t,label:`${TYPE_LABELS[t]} (${typeCounts[t]})`}))].map(({k,label}) => (
              <button
                key={k}
                onClick={() => setTypeFilter(k)}
                style={{
                  padding: "5px 12px", fontSize: "12px", fontWeight: 500, borderRadius: "20px", cursor: "pointer",
                  border: typeFilter === k ? "none" : "1px solid var(--border)",
                  background: typeFilter === k ? "var(--ink)" : "var(--bg-sunk)",
                  color: typeFilter === k ? "var(--surface)" : "var(--ink-soft)",
                  transition: "background 0.15s, color 0.15s",
                }}
              >{label}</button>
            ))}
          </div>
          {/* Row 2 — companies (wrap-safe chips) */}
          <div style={{ display: "flex", flexWrap: "wrap", gap: "6px", alignItems: "center" }}>

    if (needle) {
      list = list.filter(c => {
        const blob = [c.name, c.area, (c.areas || []).join(" "), (c.themes || []).join(" "), c.signalSummary, c.dominantFunction, c.dominantFocus]
          .filter(Boolean).join(" ").toLowerCase();
        return blob.includes(needle);
      });
    }
    // Apply lens filter — each team sees relevant subset
    if (lens === "Executives") list = list.filter(c => c.threat === "CRITICAL" || c.threat === "HIGH");
    else if (lens === "SDRs")  list = list.filter(c => ["CRITICAL","HIGH","MEDIUM"].includes(c.threat));
    else if (lens === "PMM")   list = list.filter(c => c.routes && c.routes.includes("PMM"));
    else if (lens === "Marketing") list = list.filter(c => c.routes && c.routes.includes("Marketing"));
    // Product / All: full roster
    return list;
  }, [sorted, areaFilter, lens, needle]);

  const maxCount = useMemoP(() => Math.max(...sorted.map(c => c.postingCount)), [sorted]);

  const totalRoles = useMemoP(() => sorted.reduce((s, c) => s + c.postingCount, 0), [sorted]);
  const highIntensity = useMemoP(() => sorted.filter(c => c.intensity === "HIGH").length, [sorted]);
  const critHighCount = useMemoP(() => sorted.filter(c => c.threat === "CRITICAL" || c.threat === "HIGH").length, [sorted]);
  const topFocus = useMemoP(() => {
    const freq = {};
    for (const c of sorted) { const f = c.dominantFocus || "—"; freq[f] = (freq[f]||0) + c.postingCount; }
    return Object.entries(freq).sort((a,b) => b[1]-a[1])[0]?.[0] || "—";
  }, [sorted]);

  // Flatten implications into a feed — "what they're building"
  const implFeed = useMemoP(() => {
    const feed = [];
    const perComp = lens === "Executives" ? 1 : 2;
    for (const c of filtered) {
      const impls = c.implications || [];
      for (const text of impls.slice(0, perComp)) {
        feed.push({ id: c.id, company: c.name, area: c.area, threat: c.threat, text });
      }
    }
    return feed;
  }, [filtered, lens]);

  return (
    <div data-screen-label="00 Hiring intelligence">
      <div className="hero">
        <div className="hero-title-row">
          <div>
            <div className="hero-eyebrow">V2 roster · {lens} lens · real-time job data</div>
            <h1 className="hero-title">Hiring intelligence</h1>
            <p className="hero-sub">What competitors are building — decoded from who they're hiring. Click any row or signal to open the full brief.</p>
          </div>
        </div>
        <div className="kpis">
          <window.KpiTile tone="blue" k="Total active roles" v={totalRoles} delta="across 11 companies" deltaDir="flat" sub="30-day rolling window" />
          <window.KpiTile tone="red" k="Hiring surges" v={highIntensity} delta="HIGH intensity" deltaDir="up" sub="Active acceleration detected" />
          <window.KpiTile tone="amber" k="Top focus area" v={topFocus} delta="by volume" deltaDir="flat" sub="Most-hired product area" />
          <window.KpiTile tone="slate" k="Critical + High" v={critHighCount} delta="threat companies" deltaDir="up" sub="Requiring immediate attention" />
        </div>
      </div>

      {/* Section 1 — Hiring velocity bars */}
      <div className="hi-section">
        <div className="hi-sec-head">
          <div className="hi-sec-head-l">
            <h2 className="list-h">Hiring velocity</h2>
            <span className="list-count">{filtered.length}</span>
          </div>
          <div className="seg">
            {areas.map(a => (
              <button key={a} className={areaFilter === a ? "seg-on" : ""} onClick={() => setAreaFilter(a)}>
                {a === "all" ? "All areas" : a}
              </button>
            ))}
          </div>
        </div>
        <div className="hi-bars">
          {filtered.map(c => {
            const t = window.THREAT[c.threat];
            const pct = maxCount > 0 ? (c.postingCount / maxCount) * 100 : 0;
            return (
              <div key={c.id} className="hi-bar-row" onClick={() => onOpen(c.id)}>
                <div className="hi-bar-name">
                  <span className="hi-bar-dot" style={{ background: t.dot }} />
                  {c.name}
                </div>
                <div className="hi-bar-track">
                  <div className="hi-bar-fill" style={{ width: pct + "%", background: t.rail }} />
                </div>
                <div className="hi-bar-meta">
                  <span className="hi-bar-val">{c.postingCount}</span>
                  <span className="hi-bar-fn">{c.dominantFunction}</span>
                  <window.ThreatBadge level={c.threat} />
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Section 2 — What they're building (implications feed) */}
      <div className="hi-section">
        <div className="hi-sec-head">
          <div className="hi-sec-head-l">
            <h2 className="list-h">What they're building</h2>
            <span className="list-count">{implFeed.length} signals</span>
          </div>
          <span style={{ fontSize:"12px", color:"var(--ink-mute)" }}>
            {lens === "Product" ? "Engineering & product signals · click to open brief" :
             lens === "SDRs" ? "Account intel from hiring patterns · click for full brief" :
             lens === "Executives" ? "Critical threats only · click for full brief" :
             lens === "PMM" ? "Positioning signals decoded from hiring · click for full brief" :
             "Decoded from hiring patterns · click to open brief"}
          </span>
        </div>
        <div className="hi-feed">
          {implFeed.map((item, i) => {
            const t = window.THREAT[item.threat];
            return (
              <div key={i} className="hi-feed-item" onClick={() => onOpen(item.id)}>
                <div className="hi-feed-co">
                  <span className="hi-feed-dot" style={{ background: t.dot }} />
                  <span className="hi-feed-name">{item.company}</span>
                  <window.AreaBadge>{item.area}</window.AreaBadge>
                </div>
                <p className="hi-feed-text">{item.text}</p>
              </div>
            );
          })}
        </div>
      </div>

      {/* Section 3 — Function trends */}
      {window.FUNCTION_TRENDS && (
        <div className="hi-section">
          <div className="hi-sec-head">
            <div className="hi-sec-head-l">
              <h2 className="list-h">Hiring by function</h2>
              <span className="list-count">across {filtered.length} companies</span>
            </div>
            <span style={{ fontSize:"12px", color:"var(--ink-mute)" }}>5 key functions · 30-day window</span>
          </div>
          <div className="hi-bars">
            {Object.entries(window.FUNCTION_TRENDS).map(([func, data]) => {
              const maxTotal = Math.max(...Object.values(window.FUNCTION_TRENDS).map(d => d.total), 1);
              const pct = (data.total / maxTotal) * 100;
              const topCo = data.companies[0]?.name || "\u2014";
              return (
                <div key={func} className="hi-bar-row" style={{ cursor: "default" }}>
                  <div className="hi-bar-name" style={{ minWidth: 180 }}>
                    <span className="hi-bar-co">{func}</span>
                  </div>
                  <div className="hi-bar-track">
                    <div className="hi-bar-fill" style={{ width: pct + "%", background: "var(--blue-500)" }} />
                  </div>
                  <div className="hi-bar-meta">
                    <span className="hi-bar-val">{data.total}</span>
                    <span className="hi-bar-fn">led by {topCo}</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// --- Notifications drawer -----------------------------------------------
function NotifDrawer({ open, onClose }) {
  useEffect(() => {
    if (!open) return;
    function onKey(e) { if (e.key === "Escape") onClose(); }
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [open, onClose]);

  if (!open) return null;

  // Computed inline — LAUNCHES/EVENTS are global constants, no memoization needed
  const items = [
    ...(window.LAUNCHES || []).map(l => ({ ...l, kind: "launch" })),
    ...(window.EVENTS || []).map(e => ({ ...e, kind: "event", title: e.name })),
  ].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 12);

  const kindLabel = { launch: "Launch", event: "Event" };

  return (
    <div className="drw-wrap drw-wrap-right" onClick={onClose}>
      <aside className="notif-drw" onClick={e => e.stopPropagation()}>
        <header className="drw-head">
          <div>
            <div className="drw-eyebrow">Signal feed · latest activity</div>
            <h2 className="drw-title">Notifications</h2>
          </div>
          <button className="drw-close" onClick={onClose} aria-label="Close">
            <svg width="14" height="14" viewBox="0 0 14 14"><path d="M3 3 L11 11 M11 3 L3 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>
          </button>
        </header>
        <div className="notif-body">
          {items.length === 0 && (
            <div className="notif-empty">No recent signals.</div>
          )}
          {items.map((item, i) => {
            const rel = item.relevance || "MEDIUM";
            const relColors = window.THREAT;
            const dot = rel === "HIGH" ? relColors.CRITICAL.dot : rel === "MEDIUM" ? relColors.MEDIUM.dot : relColors.LOW.dot;
            return (
              <div key={i} className="notif-item">
                <div className="notif-item-head">
                  <span className="notif-dot" style={{ background: dot }} />
                  <span className="notif-company">{item.company}</span>
                  <span className="notif-kind">{kindLabel[item.kind] || item.kind}</span>
                  <span className="notif-rel" style={{ color: dot }}>{rel}</span>
                </div>
                <div className="notif-title">{item.title}</div>
                <div className="notif-date">{item.date}</div>
                {item.summary && <p className="notif-summary">{item.summary}</p>}
              </div>
            );
          })}
        </div>
        <footer className="notif-foot">
          <span>{items.length} signals · updated continuously</span>
        </footer>
      </aside>
    </div>
  );
}

Object.assign(window, { LaunchesPage, CompaniesPage, HiringPage, NotifDrawer, RelevanceBadge });
  </script>

  <!-- App (routes + DashboardPage) -->
  <script type="text/babel">
// Main app — routes between Hiring / Dashboard / Launches / Companies pages
const { useState: useStateApp, useMemo: useMemoApp, useEffect: useEffectApp } = React;

function App() {
  const [lens, setLens] = useStateApp(() => localStorage.getItem("ci-lens") || "All");
  const [page, setPage] = useStateApp(() => localStorage.getItem("ci-page") || "hiring");
  const [q, setQ] = useStateApp("");
  const [openId, setOpenId] = useStateApp(null);
  const [chatOpen, setChatOpen] = useStateApp(false);
  const [notifOpen, setNotifOpen] = useStateApp(false);
  const [collapsed, setCollapsed] = useStateApp(false);

  useEffectApp(() => { localStorage.setItem("ci-lens", lens); }, [lens]);
  useEffectApp(() => { localStorage.setItem("ci-page", page); }, [page]);

  const kpi = useMemoApp(() => {
    const criticals = window.COMPETITORS.filter(c => c.threat === "CRITICAL");
    const criticalSub = criticals.length
      ? criticals.map(c => c.name).slice(0, 2).join(" · ")
      : "None this week";
    const upcomingNames = window.EVENTS.slice(0, 3).map(e => e.name.split(":")[0].trim());
    const eventSub = upcomingNames.length ? upcomingNames.join(" · ") : "No upcoming events";
    return {
      critical: criticals.length,
      launches: window.LAUNCHES.length,
      events: window.EVENTS.length,
      actions: 12,
      criticalSub,
      eventSub,
    };
  }, []);

  const ordered = useMemoApp(() => {
    const order = { CRITICAL: 0, HIGH: 1, MEDIUM: 2, LOW: 3 };
    const hit = (c) => {
      if (!q.trim()) return true;
      const needle = q.toLowerCase();
      return (
        c.name.toLowerCase().includes(needle) ||
        c.area.toLowerCase().includes(needle) ||
        (c.areas || []).some(a => a.toLowerCase().includes(needle)) ||
        (c.themes || []).some(t => t.toLowerCase().includes(needle)) ||
        c.signals.some(s => s.label.toLowerCase().includes(needle)) ||
        (c.verdict.All || "").toLowerCase().includes(needle) ||
        (c.signalSummary || "").toLowerCase().includes(needle)
      );
    };
    return [...window.COMPETITORS]
      .filter(hit)
      .sort((a, b) => order[a.threat] - order[b.threat] || b.score - a.score);
  }, [q]);

  const openComp = openId ? window.COMPETITORS.find(c => c.id === openId) : null;

  return (
    <div className="app">
      <window.Sidebar
        lens={lens} onLens={setLens}
        collapsed={collapsed} onToggle={() => setCollapsed(v => !v)}
        page={page} onPage={setPage}
      />

      <main className="main">
        <window.TopBar q={q} onSearch={setQ} onChat={() => setChatOpen(true)} onNotif={() => setNotifOpen(true)} lens={lens} page={page} onPage={setPage} />

        {page === "hiring" && (
          <window.HiringPage onOpen={setOpenId} lens={lens} q={q} />
        )}
        {page === "dashboard" && (
          <DashboardPage lens={lens} ordered={ordered} kpi={kpi} onOpen={setOpenId} q={q} />
        )}
        {page === "launches" && (
          <window.LaunchesPage lens={lens} onOpenCompany={setOpenId} q={q} />
        )}
        {page === "news" && (
          <window.NewsPage lens={lens} onOpenCompany={setOpenId} q={q} />
        )}
        {page === "companies" && (
          <window.CompaniesPage lens={lens} onOpenCompany={setOpenId} q={q} />
        )}

        <footer className="app-foot">
          <span>Actian CI · internal · data updated continuously · <span style={{fontFamily:"var(--font-mono)",fontSize:"10px",opacity:0.7}}>public data</span></span>
          <span>v3.0.0 · 11 competitors · {window.LAUNCHES.length} launches · {window.EVENTS.length} events</span>
        </footer>
      </main>

      {openComp && <window.BriefDrawer comp={openComp} lens={lens} onClose={() => setOpenId(null)} />}
      <window.ChatDrawer open={chatOpen} onClose={() => setChatOpen(false)} lens={lens} />
      <window.NotifDrawer open={notifOpen} onClose={() => setNotifOpen(false)} />
    </div>
  );
}

function DashboardPage({ lens, ordered, kpi, onOpen }) {
  const { useState: useStateDash, useMemo: useMemoDash } = React;
  const [view, setView] = useStateDash("grid");
  const [sortBy, setSortBy] = useStateDash("threat");
  const [areaFilter, setAreaFilter] = useStateDash("all");
  const [filterOpen, setFilterOpen] = useStateDash(false);

  const SORT_OPTS = ["threat", "score", "name", "postings"];
  const SORT_LABELS = { threat: "Threat", score: "Score", name: "A\u2013Z", postings: "Postings" };

  const areas = useMemoDash(() => ["all", ...Object.keys(window.AREA)], []);

  const sorted = useMemoDash(() => {
    let list = areaFilter === "all" ? [...ordered] : ordered.filter(c => (c.areas && c.areas.length ? c.areas.includes(areaFilter) : c.area === areaFilter));
    const THREAT_ORDER = { CRITICAL: 0, HIGH: 1, MEDIUM: 2, LOW: 3 };
    if (sortBy === "threat") list.sort((a, b) => THREAT_ORDER[a.threat] - THREAT_ORDER[b.threat] || b.score - a.score);
    else if (sortBy === "score") list.sort((a, b) => b.score - a.score);
    else if (sortBy === "name") list.sort((a, b) => a.name.localeCompare(b.name));
    else if (sortBy === "postings") list.sort((a, b) => b.postingCount - a.postingCount);
    return list;
  }, [ordered, sortBy, areaFilter]);

  return (
    <div data-screen-label="01 Verdict dashboard">
      <div className="hero">
        <div className="hero-title-row">
          <div>
            <div className="hero-eyebrow">{todayString()} · Week 16</div>
            <h1 className="hero-title">Competitive verdicts</h1>
            <p className="hero-sub">
              {sorted.length} companies · sorted by {SORT_LABELS[sortBy].toLowerCase()}. Team lens reweights signals and Actian action per card.
            </p>
          </div>
          <div className="hero-legend">
            {["CRITICAL","HIGH","MEDIUM","LOW"].map(l => (
              <span key={l} className="legend-item">
                <span className="legend-dot" style={{ background: window.THREAT[l].dot }} />
                <span className="legend-label">{l}</span>
                <span className="legend-count">{window.COMPETITORS.filter(c => c.threat === l).length}</span>
              </span>
            ))}
          </div>
        </div>
        <window.KpiRow data={kpi} />
      </div>

      <div className="list-head">
        <div className="list-head-l">
          <h2 className="list-h">Verdict cards</h2>
          <span className="list-count">{sorted.length}</span>
        </div>
        <div className="list-head-r">
          <div className="seg">
            <button className={view === "grid" ? "seg-on" : ""} onClick={() => setView("grid")}>Grid</button>
            <button className={view === "table" ? "seg-on" : ""} onClick={() => setView("table")}>Table</button>
          </div>
          <button className="list-btn" onClick={() => setSortBy(s => { const i = SORT_OPTS.indexOf(s); return SORT_OPTS[(i+1) % SORT_OPTS.length]; })}>
            <svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 3 H10 M3 6 H9 M4 9 H8" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/></svg>
            Sort: {SORT_LABELS[sortBy]}
          </button>
          <button className={"list-btn" + (filterOpen ? " list-btn-active" : "")} onClick={() => setFilterOpen(v => !v)}>
            <svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 3 H10 M2 6 H10 M2 9 H6" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/></svg>
            Filter{areaFilter !== "all" ? ` \u00b7 ${areaFilter}` : ""}
          </button>
        </div>
      </div>

      {filterOpen && (
        <div className="dash-filter-bar">
          {areas.map(a => (
            <button key={a} className={"hi-pill" + (areaFilter === a ? " active" : "")} onClick={() => setAreaFilter(a)}>
              {a === "all" ? "All areas" : a}
            </button>
          ))}
        </div>
      )}

      {view === "grid" && (
        <section className={"grid" + (lens !== "All" ? " lens-active" : "")}>
          {sorted.map(c => (
            <window.VerdictCard key={c.id} c={c} lens={lens} onOpen={onOpen} />
          ))}
        </section>
      )}

      {view === "table" && (
        <div className="ctable">
          <div className="ctable-head">
            <div>Company</div>
            <div>Area</div>
            <div>Threat</div>
            <div>Score</div>
            <div>Postings</div>
            <div>{lens === "All" ? "Verdict" : lens + " action"}</div>
            <div></div>
          </div>
          {sorted.map(c => (
            <div key={c.id} className="ctable-row" onClick={() => onOpen(c.id)}>
              <div className="ctable-name">
                <span className={"ctable-dot t-" + c.threat.toLowerCase()} />
                <span className="ctable-name-text">{c.name}</span>
              </div>
              <div><window.AreaBadge>{c.area}</window.AreaBadge></div>
              <div><window.ThreatBadge level={c.threat} /></div>
              <div className="ctable-score">
                <span className="ctable-score-v">{c.score}</span>
              </div>
              <div className="ctable-num">{c.postingCount}</div>
              <div className="ctable-dir">{(c.verdict[lens] || c.verdict.All || "").slice(0, 80)}{(c.verdict[lens] || c.verdict.All || "").length > 80 ? "\u2026" : ""}</div>
              <div className="ctable-arrow" aria-hidden>&#x2197;</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function todayString() {
  const d = new Date();
  return d.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
}

// Assign components to window for React JSX
window.HiringPage = HiringPage;
window.LaunchesPage = LaunchesPage;
window.NewsPage = NewsPage;
window.CompaniesPage = CompaniesPage;

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
